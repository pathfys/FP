    * { box-sizing: border-box; }

    #root { min-height: 100vh; }
    input, textarea, button { font-family: inherit; }
    #err { display:none; padding:20px; margin:20px; background:#FEF2F2; border:1px solid #FCA5A5; border-radius:12px; color:#B91C1C; font-size:13px; white-space:pre-wrap; font-family:monospace; }

    /* Chromium сериализует инлайн-цвета в rgb(...), поэтому матчим rgb() c префиксом свойства */
    body.dark, body.dark #root { background:#0B1220 !important; }
    body.dark h1, body.dark h2, body.dark h3 { color:#F1F5F9 !important; }
    /* фон приложения/страниц #F1F5F9 */
    body.dark [style*="background: rgb(241, 245, 249)"] { background:#0B1220 !important; }
    /* белые карточки/панели/меню/шторки #fff */
    body.dark [style*="background: rgb(255, 255, 255)"] { background:#162033 !important; }
    /* светлые панели #F8FAFC */
    body.dark [style*="background: rgb(248, 250, 252)"] { background:#182234 !important; }
    /* светло-голубые акценты #EFF6FF */
    body.dark [style*="background: rgb(239, 246, 255)"] { background:#17233B !important; }
    /* тёмный текст #111 / #333 → светлый */
    body.dark [style*="color: rgb(17, 17, 17)"],
    body.dark [style*="color: rgb(51, 51, 51)"] { color:#E2E8F0 !important; }
    /* приглушённый текст #64748B → светлее */
    body.dark [style*="color: rgb(100, 116, 139)"] { color:#94A3B8 !important; }
    /* границы #E2E8F0 / #E8E8E8 */
    body.dark [style*="rgb(226, 232, 240)"],
    body.dark [style*="rgb(232, 232, 232)"] { border-color:#2A3852 !important; }
    body.dark input, body.dark textarea { background:#162033 !important; color:#E2E8F0 !important; }

    /* ── ANIMATIONS ── */
    @keyframes fadeIn { from { opacity:0; transform: translateY(8px); } to { opacity:1; transform:none; } }
    @keyframes spin   { to { transform: rotate(360deg); } }
    @keyframes pop    { 0% { transform: scale(.6); opacity:0; } 60% { transform: scale(1.08); } 100% { transform: scale(1); opacity:1; } }

  </style>

const CI = ({ bg, children, size = 36 }) => (
  <div style={{
    width: size, height: size, borderRadius: "50%", background: bg,
    display: "flex", alignItems: "center", justifyContent: "center",
    flexShrink: 0, color: "#fff", fontWeight: 700,
    fontSize: size * 0.44, lineHeight: 1,
  }}>{children}</div>
);

const Sym = ({ s, f = 0.46, children }) => (
  <span style={{ fontSize: s * f, fontWeight: 700, lineHeight: 1, fontFamily: "Arial, sans-serif" }}>{children}</span>
);

  return `${p(x.getDate())}.${p(x.getMonth()+1)}.${x.getFullYear()}, ${p(x.getHours())}:${p(x.getMinutes())}:${p(x.getSeconds())}`;
};

const NOTO = "https://fonts.gstatic.com/s/e/notoemoji/latest/";
const EMO = {
  warning: { code:"26a0_fe0f", char:"⚠️" },
  check:   { code:"2705",      char:"✅" },
  cross:   { code:"274c",      char:"❌" },
  bang:    { code:"2757",      char:"❗" },
  lock:    { code:"1f512",     char:"🔒" },
  party:   { code:"1f389",     char:"🎉" },
};
function Emo({ name, size = 22, style }) {
  const [failed, setFailed] = useState(false);
  const e = EMO[name] || { code:null, char:"•" };
  if (failed || !e.code)
    return <span style={{fontSize:size,lineHeight:1,...style}}>{e.char}</span>;
  return <img src={NOTO + e.code + "/512.gif"} width={size} height={size} alt={e.char}
    style={{display:"inline-block",verticalAlign:"middle",...style}}
    onError={() => setFailed(true)} />;
}

/* ── данные пользователя из Telegram WebApp ── */
function getTgUser() {
  try {
    const u = window.Telegram?.WebApp?.initDataUnsafe?.user;
    if (u) {
      const name = [u.first_name, u.last_name].filter(Boolean).join(" ") || "User";
      return {
        name,
        username: u.username ? "@" + u.username : "",
        photo: u.photo_url || "",
        initial: (u.first_name?.[0] || "U").toUpperCase(),
      };
    }
  } catch (e) {}
  return { name: "slap", username: "@slapgramm", photo: "", initial: "S" };
}

function usdRate(currency, rates) {
  if (currency === "USD" || currency === "USDT") return rates["USDT/USD"] || 1;
  const d = rates[currency + "/USD"];
  if (d !== undefined) {
    const n = parseFloat(d);
    if (["RUB","UAH","CNY","AED","KZT"].includes(currency)) return 1 / n;
    return n;
  }
  return 1;
}

  switch (deal.status) {

      return (
        <div style={{display:"flex",flexDirection:"column",gap:10}}>
          <Btn onClick={onShare}>🔗 Поделиться сделкой</Btn>
          <OBtn onClick={() => onUpd(deal.id, "joined")}>Продавец присоединился (демо)</OBtn>
          {cancelBtn}
        </div>
      );
    case "joined":
      return (
        <div style={{display:"flex",flexDirection:"column",gap:10}}>
          {IS_ADMIN
            ? <Btn onClick={onPay}>💳 Внести оплату</Btn>
            : <div style={{textAlign:"center",color:"#94A3B8",fontSize:13,padding:"8px 0"}}>⏳ Оплату вносит администратор</div>}
          {cancelBtn}
        </div>
      );
    case "paid":
      return <Btn onClick={() => onUpd(deal.id, "escrow")}>Товар передан в эскроу</Btn>;
    case "escrow":
      return <Btn onClick={() => onUpd(deal.id, "received")}>✓ Подтвердить получение</Btn>;

      return <p style={{textAlign:"center",color:"#16A34A",fontWeight:700,margin:0}}>✅ Сделка завершена</p>;
    default:
      return <p style={{textAlign:"center",color:"#EF4444",fontWeight:700,margin:0}}>❌ Сделка отменена</p>;
  }
}

const Err = ({ msg }) => msg
  ? <p style={{fontSize:12,fontWeight:600,color:"#EF4444",margin:"8px 0 0"}}>⚠️ {msg}</p> : null;

// проверка суммы: возвращает текст ошибки или "" если всё ок
function checkAmount(raw, min, cur, max) {
  const s = String(raw).trim().replace(",", ".");
  if (!s) return t("e_amount");
  const n = parseFloat(s);
  if (isNaN(n) || n <= 0) return t("e_amount");
  if (n < min) return t("e_min", { m: min, c: cur });
  if (max != null && n > max) return t("e_funds");
  return "";
}

function MReq({ info, value, onSave, onClose }) {
  const [v, setV] = useState(value);
  const [err, setErr] = useState("");
  const submit = () => {
    const s = v.trim();
    if (!s) { setErr(t("e_dest")); return; }
    if (info.card && s.replace(/\D/g, "").length < 16) { setErr(t("e_card")); return; }
    onSave(s);
  };
  return (
    <Ov onClose={onClose}><Sh>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"18px 20px 10px"}}>
        <h3 style={{fontSize:18,fontWeight:700,margin:0}}>{info.label}</h3>
        <XBtn onClick={onClose}/>
      </div>
      <div style={{padding:"0 20px 24px"}}>
        <input value={v} onChange={e=>{ setV(e.target.value); setErr(""); }} autoFocus
          placeholder={info.card ? "0000 0000 0000 0000" : t("w_address")} style={wInp}/>
        <Err msg={err}/>
        <Btn style={{marginTop:14}} onClick={submit}>{t("w_save")}</Btn>
      </div>
    </Sh></Ov>
  );
}

/* ══════════════════════════════════
   MODAL: SAFETY (10s countdown)
   ══════════════════════════════════ */
function MSafety({ onClose, onConfirm }) {
  const [left, setLeft] = useState(10);
  useEffect(() => {
    if (left <= 0) return;
    const t = setTimeout(() => setLeft(left - 1), 1000);
    return () => clearTimeout(t);
  }, [left]);
  const ready = left <= 0;
  const rules = [
    ["check", <span>Передавайте подарок <b>ТОЛЬКО</b> на аккаунт <span style={{color:"#2F80ED"}}>{ESCROW_MANAGER}</span></span>, "#DCFCE7"],
    ["cross", <span><b>НИКОГДА</b> не отправляйте напрямую покупателю</span>, "#FEE2E2"],
    ["warning", <span>Даже если покупатель уговаривает — <b>НЕ ДЕЛАЙТЕ ЭТОГО!</b></span>, "#FEF3C7"],
  ];
  return (
    <Ov onClose={ready ? onClose : undefined}><Sh>
      <div style={{padding:"22px 20px 24px"}}>
        <div style={{textAlign:"center",marginBottom:14}}>
          <div style={{width:56,height:56,borderRadius:28,background:"#FEE2E2",display:"inline-flex",alignItems:"center",justifyContent:"center"}}>
            <Emo name="warning" size={30}/>
          </div>
          <h3 style={{fontSize:18,fontWeight:800,margin:"12px 0 0",color:"#111"}}>Безопасность сделки</h3>
        </div>
        <p style={{fontSize:12.5,fontWeight:800,color:"#EF4444",margin:"0 0 10px"}}><Emo name="bang" size={14}/> ВНИМАНИЕ! ВАЖНАЯ ИНФОРМАЦИЯ О БЕЗОПАСНОСТИ</p>
        <div style={{background:"#FEF2F2",border:"1px solid #FECACA",borderRadius:10,padding:"10px 12px",marginBottom:12,display:"flex",alignItems:"center",gap:8}}>
          <Emo name="warning" size={16}/>
          <p style={{fontSize:13,fontWeight:700,color:"#B91C1C",margin:0}}>Участились случаи мошенничества!</p>
        </div>
        <p style={{fontSize:13,color:"#334155",margin:"0 0 14px",lineHeight:1.5}}>Мошенники возвращают платежи за сделки и просят передать подарок напрямую им, минуя эскроу-аккаунт.</p>
        <p style={{fontSize:13,fontWeight:700,color:"#16A34A",margin:"0 0 10px"}}><Emo name="lock" size={15}/> Правила безопасности:</p>
        {rules.map(([em,node,bg],i)=>(
          <div key={i} style={{display:"flex",gap:10,alignItems:"flex-start",background:bg,borderRadius:10,padding:"10px 12px",marginBottom:8}}>
            <Emo name={em} size={20} style={{flexShrink:0}}/>
            <span style={{fontSize:13,color:"#334155",lineHeight:1.4}}>{node}</span>
          </div>
        ))}
        <button disabled={!ready} onClick={() => ready && onConfirm()} style={{
          width:"100%",marginTop:12,padding:"14px 20px",borderRadius:14,border:"none",fontSize:15,fontWeight:700,
          cursor: ready ? "pointer" : "default",
          background: ready ? "linear-gradient(135deg,#EF4444,#DC2626)" : "#F1F5F9",
          color: ready ? "#fff" : "#94A3B8",
        }}>{ready ? "Прочитал(а), продолжить" : `Прочитайте — ${left}с`}</button>
      </div>
    </Sh></Ov>
  );
}

/* ══════════════════════════════════
   MODAL: SHARE DEAL
   ══════════════════════════════════ */
function MShareDeal({ deal, buyer, onClose }) {
  const [lang, setLang] = useState("ru");
  const [copied, setCopied] = useState(false);
  const text = buildDealText(deal, buyer, lang);
  const tg = window.Telegram?.WebApp;
  const forward = () => {
    const url = "https://t.me/share/url?url=" + encodeURIComponent(dealLink(deal.code)) +
                "&text=" + encodeURIComponent(text);
    tg?.openTelegramLink ? tg.openTelegramLink(url) : window.open(url, "_blank");
  };
  const copy = async () => {
    try { await navigator.clipboard.writeText(text); } catch (e) {}
    setCopied(true); setTimeout(() => setCopied(false), 1500);
  };
  return (
    <Ov onClose={onClose}><Sh>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"18px 20px 10px"}}>
        <h3 style={{fontSize:18,fontWeight:700,margin:0}}>Поделиться</h3>
        <XBtn onClick={onClose}/>
      </div>
      <div style={{padding:"0 20px 24px"}}>
        <p style={{fontSize:12,color:"#94A3B8",textAlign:"center",margin:"0 0 10px"}}>Язык карточки</p>
        <div style={{display:"flex",gap:8,justifyContent:"center",marginBottom:16,flexWrap:"wrap"}}>
          {SHARE_LANGS.map(l => (
            <button key={l.code} onClick={() => setLang(l.code)} style={{
              display:"flex",flexDirection:"column",alignItems:"center",padding:"6px 12px",borderRadius:10,cursor:"pointer",
              background:lang===l.code?"#EFF6FF":"#fff",
              border:lang===l.code?"2px solid #2F80ED":"1.5px solid #E2E8F0",
              color:lang===l.code?"#2F80ED":"#333",
            }}>
              <span style={{fontSize:14,fontWeight:700}}>{l.ab}</span>
              <span style={{fontSize:10,color:"#94A3B8"}}>{l.sub}</span>
            </button>
          ))}
        </div>
        <pre style={{whiteSpace:"pre-wrap",wordBreak:"break-word",background:"#F8FAFC",border:"1px solid #E2E8F0",
          borderRadius:14,padding:14,fontSize:13,color:"#333",margin:"0 0 16px",fontFamily:"inherit",lineHeight:1.5,
          direction:lang==="ar"?"rtl":"ltr"}}>{text}</pre>
        <Btn onClick={forward} style={{marginBottom:10}}>✈️ Переслать в чат</Btn>
        <OBtn onClick={copy}>{copied ? "✓ Скопировано" : "⧉ Скопировать текст"}</OBtn>
      </div>
    </Sh></Ov>
  );
}

/* ══════════════════════════════════
   MODAL: PAY DEAL (stub, 3 taps)
   ══════════════════════════════════ */
function MPayDeal({ deal, onPaid, onClose }) {
  const [step, setStep] = useState(1);   // 3 нажатия: Продолжить → Оплатить → Готово
  const amt = parseFloat(deal.amount) || 0;
  const total = (amt * (1 + COMMISSION)).toFixed(2);
  const pay = () => { onPaid?.(deal.id); setStep(3); };
  return (
    <Ov onClose={onClose}><Sh>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"18px 20px 10px"}}>
        <h3 style={{fontSize:18,fontWeight:700,margin:0}}>Оплата сделки</h3>
        <XBtn onClick={onClose}/>
      </div>
      <div style={{padding:"0 20px 28px",textAlign:"center"}}>
        {step === 1 && <>
          <div style={{margin:"6px 0 14px",display:"flex",justifyContent:"center"}}>{icon(deal.currency, 56)}</div>
          <p style={{fontSize:28,fontWeight:800,color:"#111",margin:"0 0 4px"}}>{deal.amount} {deal.currency}</p>
          <p style={{fontSize:12,color:"#94A3B8",margin:0}}>Сделка #{deal.code}</p>
          <p style={{fontSize:12,color:"#CBD5E1",margin:"14px 0 0"}}>Шаг 1 из 3</p>
          <Btn style={{marginTop:8}} onClick={() => setStep(2)}>Продолжить</Btn>
        </>}
        {step === 2 && <>
          <p style={{fontSize:14,color:"#334155",margin:"16px 0 6px"}}>К оплате с комиссией {(COMMISSION*100)}%:</p>
          <p style={{fontSize:28,fontWeight:800,color:"#111",margin:0}}>{total} {deal.currency}</p>
          <p style={{fontSize:13,color:"#64748B",margin:"12px 0 0",lineHeight:1.5}}>Средства удержит эскроу {ESCROW_MANAGER} до получения товара.</p>
          <p style={{fontSize:12,color:"#CBD5E1",margin:"14px 0 0"}}>Шаг 2 из 3</p>
          <Btn style={{marginTop:8}} onClick={pay}>Оплатить {total} {deal.currency}</Btn>
        </>}
        {step === 3 && <>
          <div style={{width:72,height:72,borderRadius:36,background:"#DCFCE7",display:"flex",alignItems:"center",justifyContent:"center",margin:"14px auto 12px"}}>
            <svg width="34" height="34" viewBox="0 0 24 24" fill="none"><path d="M5 13l4 4L19 7" stroke="#16A34A" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"/></svg>

          <p style={{fontSize:20,fontWeight:700,color:"#111",margin:"0 0 6px"}}>Оплата принята</p>
          <p style={{fontSize:13,color:"#64748B",margin:0}}>Сделка перешла в статус «Оплачена».</p>
          <Btn style={{marginTop:20}} onClick={onClose}>Готово</Btn>
        </>}
      </div>
    </Sh></Ov>
  );

/* ══════════════════════════════════
   SHARED COMPONENTS
   ══════════════════════════════════ */
function Btn({ children, style, ...p }) { return <button style={{...S.btn,...style}} {...p}>{children}</button>; }
function OBtn({ children, ...p }) { return <button style={S.oBtn} {...p}>{children}</button>; }
function TBtn({ on, children, ...p }) { return <button style={on?S.tOn:S.tOff} {...p}>{children}</button>; }
function Tog({ on }) {
  return (
    <div style={{width:38,height:22,borderRadius:11,background:on?"#2F80ED":"#E2E8F0",position:"relative",transition:"background .2s",flexShrink:0}}>
      <div style={{width:18,height:18,borderRadius:9,background:"#fff",position:"absolute",top:2,left:on?18:2,transition:"left .2s",boxShadow:"0 1px 3px rgba(0,0,0,.15)"}}/>
    </div>
  );
}
function Ov({ children, onClose }) { return <div style={S.ov} onClick={onClose}>{children}</div>; }
function Sh({ children }) { return <div style={S.sh} onClick={e=>e.stopPropagation()}>{children}</div>; }
function XBtn({ onClick }) { return <button style={S.xBtn} onClick={onClick}>×</button>; }
